<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ID Kurd AI - دانانی وشەی نهێنی نوێ</title>
  <link rel="stylesheet" href="style.css">
  
  <script type="module">
    // Import the functions you need from the SDKs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics.js";
    import { 
      getAuth, 
      confirmPasswordReset,
      verifyPasswordResetCode
    } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDIoNvW1wHk-5qlTGrnnlfMIGZfEN-ucg8",
      authDomain: "id-kurdm-ai.firebaseapp.com",
      projectId: "id-kurdm-ai",
      storageBucket: "id-kurdm-ai.firebasestorage.app",
      messagingSenderId: "500724816364",
      appId: "1:500724816364:web:0159636245557a07c7c8c9",
      measurementId: "G-TV21Q9H80V"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth();

    // Get the action code from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const actionCode = urlParams.get('oobCode');
    let email = '';

    /**
     * Check and validate reset code
     */
    window.addEventListener('DOMContentLoaded', async () => {
      if (!actionCode) {
        showMessage('error-message', "لینکەکە ناتەواوە یان بەسەرچووە. تکایە لینکێکی نوێ داوا بکە.");
        disableResetForm();
        return;
      }

      try {
        // Verify the password reset code
        email = await verifyPasswordResetCode(auth, actionCode);
        document.getElementById('email-display').textContent = email;
      } catch (error) {
        console.error("Error verifying reset code:", error);
        showMessage('error-message', "لینکەکە بەسەرچووە یان ناتەواوە. تکایە لینکێکی نوێ داوا بکە.");
        disableResetForm();
      }
    });

    /**
     * Disable reset form inputs and button
     */
    function disableResetForm() {
      document.getElementById('new-password').disabled = true;
      document.getElementById('confirm-password').disabled = true;
      document.getElementById('reset-button').disabled = true;
    }

    /**
     * Show message to user
     * @param {string} elementId - ID of message element
     * @param {string} message - Message to display
     */
    function showMessage(elementId, message) {
      const element = document.getElementById(elementId);
      element.textContent = message;
      element.style.display = 'block';
    }

    /**
     * Handle password reset submission
     */
    window.resetPassword = async function() {
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const successMessage = document.getElementById('success-message');
      const errorMessage = document.getElementById('error-message');
      
      // Hide any previous messages
      successMessage.style.display = 'none';
      errorMessage.style.display = 'none';
      
      // Validate password
      if (newPassword.length < 6) {
        showMessage('error-message', "وشەی نهێنی دەبێت لانیکەم ٦ پیت بێت");
        return;
      }
      
      // Check if passwords match
      if (newPassword !== confirmPassword) {
        showMessage('error-message', "وشەی نهێنی و دووبارەکردنەوەی یەکسان نین");
        return;
      }
      
      try {
        // Complete the password reset
        await confirmPasswordReset(auth, actionCode, newPassword);
        showMessage('success-message', "وشەی نهێنی سەرکەوتووانە گۆڕدرا");
        
        // Redirect to login page after 3 seconds
        setTimeout(() => {
          window.location.href = "login.html";
        }, 3000);
      } catch (error) {
        console.error("Error resetting password:", error);
        switch(error.code) {
          case 'auth/expired-action-code':
            showMessage('error-message', "لینکەکە بەسەرچووە. تکایە لینکێکی نوێ داوا بکە");
            break;
          case 'auth/invalid-action-code':
            showMessage('error-message', "لینکەکە ناتەواوە یان بەکارهاتووە. تکایە لینکێکی نوێ داوا بکە");
            break;
          case 'auth/weak-password':
            showMessage('error-message', "وشەی نهێنی لاوازە. تکایە وشەیەکی نهێنی بەهێزتر بەکاربهێنە");
            break;
          default:
            showMessage('error-message', "هەڵەیەک ڕوویدا، تکایە دواتر هەوڵبدەوە");
        }
      }
    }
    // ئەم کۆدە دەتوانیت لە ResetPassword.html دا، لە ناو بەشی script زیاد بکەیت

window.addEventListener('DOMContentLoaded', async () => {
  const urlParams = new URLSearchParams(window.location.search);
  const mode = urlParams.get('mode');
  const actionCode = urlParams.get('oobCode');
  
  // دڵنیابە کە مۆدەکە resetPassword ـە
  if (mode !== 'resetPassword') {
    showMessage('error-message', "لینکەکە ناتەواوە یان نادروستە.");
    disableResetForm();
    return;
  }

  if (!actionCode) {
    showMessage('error-message', "لینکەکە ناتەواوە یان بەسەرچووە. تکایە لینکێکی نوێ داوا بکە.");
    disableResetForm();
    return;
  }

  try {
    // Verify the password reset code
    email = await verifyPasswordResetCode(auth, actionCode);
    document.getElementById('email-display').textContent = email;
  } catch (error) {
    console.error("Error verifying reset code:", error);
    showMessage('error-message', "لینکەکە بەسەرچووە یان ناتەواوە. تکایە لینکێکی نوێ داوا بکە.");
    disableResetForm();
  }
});
  </script>
</head>
<body>
  <div class="background">
    <div class="stripe-red"></div>
    <div class="stripe-white"></div>
    <div class="circuit-pattern"></div>
    <div class="sun"></div>
    <div class="mountain"></div>
    <div class="particles" id="particles"></div>
    <div id="data-streams"></div>
  </div>

  <div class="container">
    <div class="logo">
      <div class="logo-container">
        <div class="logo-star"></div>
      </div>
      <div class="logo-text">ID Kurd AI</div>
    </div>

    <div class="reset-password-container">
      <h2>دانانی وشەی نهێنی نوێ</h2>
      <p class="reset-info">تکایە وشەی نهێنی نوێ دیاری بکە بۆ ئیمەیڵی: <span id="email-display"></span></p>
      
      <div id="success-message" class="success-message" style="display:none;"></div>
      <div id="error-message" class="error-message" style="display:none;"></div>
      
      <form id="reset-form" onsubmit="event.preventDefault(); resetPassword();">
        <div class="input-group">
          <label for="new-password">وشەی نهێنی نوێ</label>
          <input type="password" id="new-password" placeholder="وشەی نهێنی نوێت بنووسە" required>
          <div class="input-icon">🔒</div>
        </div>
        
        <div class="input-group">
          <label for="confirm-password">دووبارەکردنەوەی وشەی نهێنی</label>
          <input type="password" id="confirm-password" placeholder="وشەی نهێنی دووبارە بکەوە" required>
          <div class="input-icon">🔒</div>
        </div>
        
        <button type="submit" id="reset-button" class="btn">پاشەکەوتکردنی وشەی نهێنی نوێ</button>
        
        <div class="back-to-login">
          <a href="login.html">گەڕانەوە بۆ چوونەژوورەوە</a>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
